<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Savannah Spice</title>
    <link rel="stylesheet" href="css/bootstrap/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/fontawesome/css/font-awesome.min.css">
    <!-- favicons -->
	<link rel="icon" href="images/icons/logo.jpg" sizes="32x32" />
	<link rel="icon" href="images/icons/logo.jpg" sizes="192x192" />
	<link rel="apple-touch-icon-precomposed" href="images/icons/logo.jpg" />
    <style>
        :root {
            --color-primary: #0088cc;
            --color-dark: #1d2127;
            --color-dark-lighter: #2e353e;
            --color-bg: #ecedf0;
        }

        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Open Sans", Arial, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .login-card {
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            overflow: hidden;
        }

        .login-header {
            background: var(--color-dark);
            color: #fff;
            padding: 30px;
            text-align: center;
        }

        .login-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .login-header p {
            margin: 5px 0 0;
            font-size: 14px;
            color: #abb4be;
        }

        .login-body {
            padding: 40px 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-primary);
            box-shadow: 0 0 0 3px rgba(0, 136, 204, 0.1);
        }

        .input-icon {
            position: relative;
        }

        .input-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #999;
        }

        .input-icon .form-control {
            padding-left: 45px;
        }

        .btn-login {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 12px 15px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }

        .alert-danger {
            background-color: #fee;
            color: #c33;
            border: 1px solid #fcc;
        }

        .alert-success {
            background-color: #efe;
            color: #3c3;
            border: 1px solid #cfc;
        }

        .remember-me {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .remember-me input {
            margin-right: 8px;
        }

        .remember-me label {
            margin: 0;
            font-weight: normal;
            font-size: 14px;
            color: #666;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .login-footer {
            text-align: center;
            padding: 20px;
            background: #f9f9f9;
            color: #999;
            font-size: 13px;
        }
    </style>
	<style>
		.logo-1 img {
			border-radius: 50%;
			width: 60px;
			height: 60px;
			object-fit: cover;
			margin-right: 10px;
		}
		.logo-1 a {
			display: flex;
			align-items: center;
		}
	</style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>SAVANNAH SPICE</h1>
                <p>Admin Dashboard</p>
            </div>
            <div class="login-body">
                <div id="alert-container"></div>
                <form id="login-form">
                    <div class="form-group">
                        <label for="username">Username</label>
                        <div class="input-icon">
                            <i class="fa fa-user"></i>
                            <input type="text" class="form-control" id="username" name="username" required
                                autocomplete="username" autofocus>
                        </div>
                    </div>
                    <div class="form-group">
                        <label for="password">Password</label>
                        <div class="input-icon">
                            <i class="fa fa-lock"></i>
                            <input type="password" class="form-control" id="password" name="password" required
                                autocomplete="current-password">
                        </div>
                    </div>
                    <div class="remember-me">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <button type="submit" class="btn-login" id="login-btn">
                        Sign In
                    </button>
                </form>
            </div>
            <div class="login-footer">
                &copy; 2026 Savannah Spice. All rights reserved.
            </div>
        </div>
    </div>

    <script src="js/jquery.js"></script>
    <script>
        jQuery(document).ready(function ($) {
            const loginForm = $('#login-form');
            const loginBtn = $('#login-btn');
            const alertContainer = $('#alert-container');

            // Check if already logged in
            $.get('/api/auth/check', function (response) {
                if (response.authenticated) {
                    window.location.href = '/admin-dashboard.html';
                }
            });

            loginForm.on('submit', function (e) {
                e.preventDefault();
                
                const username = $('#username').val().trim();
                const password = $('#password').val();

                if (!username || !password) {
                    showAlert('Please enter both username and password', 'danger');
                    return;
                }

                // Disable button and show loading
                loginBtn.prop('disabled', true);
                loginBtn.html('<span class="loading-spinner"></span>Signing in...');
                alertContainer.empty();

                $.ajax({
                    url: '/api/auth/login',
                    method: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ username, password }),
                    success: function (response) {
                        showAlert('Login successful! Redirecting...', 'success');
                        setTimeout(function () {
                            window.location.href = '/admin-dashboard.html';
                        }, 1000);
                    },
                    error: function (xhr) {
                        loginBtn.prop('disabled', false);
                        loginBtn.html('Sign In');
                        
                        let errorMsg = 'Login failed. Please try again.';
                        if (xhr.responseJSON && xhr.responseJSON.error) {
                            errorMsg = xhr.responseJSON.error;
                        }
                        showAlert(errorMsg, 'danger');
                    }
                });
            });

            function showAlert(message, type) {
                const alertHtml = `
                    <div class="alert alert-${type}">
                        <i class="fa fa-${type === 'danger' ? 'exclamation-circle' : 'check-circle'}"></i>
                        ${message}
                    </div>
                `;
                alertContainer.html(alertHtml);
            }
        });
    </script>
</body>

</html>
